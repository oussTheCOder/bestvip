<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Smartphone -->
  <rect x="50" y="150" width="120" height="200" rx="20" fill="url(#deviceGradient)" stroke="#00d4ff" stroke-width="2"/>
  <rect x="60" y="170" width="100" height="140" rx="8" fill="url(#screenBg)"/>
  <rect x="70" y="180" width="30" height="20" rx="2" fill="#00d4ff" opacity="0.7"/>
  <rect x="110" y="180" width="30" height="20" rx="2" fill="#0099ff" opacity="0.7"/>
  <circle cx="90" cy="230" r="8" fill="#00d4ff" opacity="0.8"/>
  <polygon points="86,225 94,230 86,235" fill="white"/>

  <!-- Tablet -->
  <rect x="220" y="120" width="160" height="240" rx="15" fill="url(#deviceGradient)" stroke="#00d4ff" stroke-width="2"/>
  <rect x="235" y="140" width="130" height="180" rx="8" fill="url(#screenBg)"/>
  <rect x="245" y="155" width="40" height="25" rx="3" fill="#00d4ff" opacity="0.7"/>
  <rect x="295" y="155" width="40" height="25" rx="3" fill="#0099ff" opacity="0.7"/>
  <rect x="245" y="190" width="40" height="25" rx="3" fill="#00d4ff" opacity="0.5"/>
  <rect x="295" y="190" width="40" height="25" rx="3" fill="#0099ff" opacity="0.5"/>
  <circle cx="270" cy="250" r="10" fill="#00d4ff" opacity="0.8"/>
  <polygon points="265,245 275,250 265,255" fill="white"/>

  <!-- Smart TV -->
  <rect x="420" y="80" width="150" height="100" rx="8" fill="url(#deviceGradient)" stroke="#00d4ff" stroke-width="2"/>
  <rect x="430" y="90" width="130" height="70" rx="4" fill="url(#screenBg)"/>
  <rect x="440" y="100" width="35" height="20" rx="2" fill="#00d4ff" opacity="0.7"/>
  <rect x="485" y="100" width="35" height="20" rx="2" fill="#0099ff" opacity="0.7"/>
  <circle cx="457" cy="135" r="8" fill="#00d4ff" opacity="0.8"/>
  <polygon points="453,130 462,135 453,140" fill="white"/>

  <!-- TV Stand -->
  <rect x="455" y="180" width="40" height="12" rx="2" fill="#333"/>
  <rect x="465" y="192" width="20" height="18" rx="2" fill="#222"/>

  <!-- Connection lines -->
  <line x1="170" y1="250" x2="220" y2="240" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="380" y1="200" x2="420" y2="180" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
</svg>