<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- TV Frame -->
  <rect x="50" y="50" width="300" height="200" rx="15" fill="url(#tvGradient)" stroke="#00d4ff" stroke-width="3"/>

  <!-- Screen -->
  <rect x="70" y="70" width="260" height="140" rx="8" fill="url(#screenGradient)"/>
  <rect x="70" y="70" width="260" height="140" rx="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Content on screen -->
  <rect x="85" y="85" width="80" height="45" rx="3" fill="#00d4ff" opacity="0.7"/>
  <rect x="175" y="85" width="80" height="45" rx="3" fill="#0099ff" opacity="0.7"/>
  <rect x="85" y="140" width="80" height="45" rx="3" fill="#00d4ff" opacity="0.5"/>
  <rect x="175" y="140" width="80" height="45" rx="3" fill="#0099ff" opacity="0.5"/>

  <!-- Play button -->
  <circle cx="200" cy="157" r="15" fill="#00d4ff" opacity="0.8"/>
  <polygon points="195,150 210,157 195,165" fill="white"/>

  <!-- TV Stand -->
  <rect x="175" y="250" width="50" height="15" rx="3" fill="#333"/>
  <rect x="190" y="265" width="20" height="20" rx="2" fill="#222"/>
</svg>